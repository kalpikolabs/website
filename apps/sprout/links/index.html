<!-- Hardcode this single URL in the app's settings screen — it fans out to everything, so the app never needs an update if links change. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Sprout — Links</title>
  <meta name="description" content="Support, privacy, and terms links for Sprout by Kalpiko Labs.">
  <meta name="theme-color" content="#352B7E">
  <link rel="canonical" href="https://kalpikolabs.com/apps/sprout/links/">

  <!-- Favicons -->
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/favicon-180.png" sizes="180x180">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/site.css">
</head>
<body class="linkhub-page">
  <div class="frame">
    <main class="linkhub">
      <img class="linkhub__icon" src="/assets/apps/sprout/icon.png" onerror="this.onerror=null;this.src='/assets/app-placeholder-icon.svg'" alt="" width="64" height="64">
      <h1 class="linkhub__name">Sprout</h1>

      <nav class="linkhub__list" aria-label="Sprout links">
        <a class="linkhub__btn linkhub__btn--primary" href="/support/">Support</a>
        <a class="linkhub__btn" href="../privacy/">Privacy Policy</a>
        <a class="linkhub__btn" href="../terms/">Terms of Use</a>
        <a class="linkhub__btn" href="mailto:support@kalpikolabs.com">Email us</a>
      </nav>
    </main>
  </div>
</body>
</html>
