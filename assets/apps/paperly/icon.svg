<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Paperly app icon">
  <defs>
    <linearGradient id="paperlyBg" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B2B4D"/>
      <stop offset="1" stop-color="#0F1A30"/>
    </linearGradient>
    <linearGradient id="paperlySheet" x1="312" y1="250" x2="712" y2="774" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F5F7"/>
    </linearGradient>
    <filter id="paperlyShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Background: full-bleed, opaque, square (stores round the corners) -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#paperlyBg)"/>

  <!-- Document sheet with a folded top-right corner -->
  <g filter="url(#paperlyShadow)">
    <path d="M 346 250 L 584 250 L 712 378 L 712 740 Q 712 774 678 774 L 346 774 Q 312 774 312 740 L 312 284 Q 312 250 346 250 Z" fill="url(#paperlySheet)"/>
    <!-- folded corner (dog-ear) -->
    <path d="M 584 250 L 712 378 L 584 378 Z" fill="#DCE6FB"/>
  </g>

  <!-- Privacy padlock (secure green) centered on the sheet -->
  <g>
    <path d="M 470 478 L 470 440 A 42 42 0 0 1 554 440 L 554 478" fill="none" stroke="#1F8A4C" stroke-width="34" stroke-linecap="round"/>
    <rect x="412" y="470" width="200" height="168" rx="28" fill="#1F8A4C"/>
    <circle cx="512" cy="536" r="19" fill="#FFFFFF"/>
    <rect x="503" y="536" width="18" height="54" rx="9" fill="#FFFFFF"/>
  </g>
</svg>
